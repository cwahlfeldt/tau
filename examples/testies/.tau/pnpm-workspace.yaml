# pnpm 10+ blocks transitive build scripts by default. Vite pulls in esbuild,
# whose native binary install is one such script. Setting `allowBuilds.esbuild`
# explicitly (true OR false) is what tells pnpm "I've thought about this; stop
# treating it as an error" — `false` keeps the build script disabled (we don't
# need esbuild's native binary; the pure-JS path works for dev) while letting
# `pnpm install` and `pnpm run` exit successfully.
#
# This is also what unblocks `pnpm run dev`, which transitively runs an install
# preflight (`runDepsStatusCheck`) — the preflight inherits this config.
allowBuilds:
  esbuild: false
